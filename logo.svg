<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="4" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <g filter="url(#shadow)" transform="rotate(-30 50 50)">
    <!-- Airplane body -->
    <ellipse cx="50" cy="50" rx="35" ry="8" fill="#1a1a1a"/>
    <!-- Wings -->
    <path d="M50 50 L50 25 L65 35 L65 50 Z" fill="#1a1a1a"/>
    <path d="M50 50 L50 75 L65 65 L65 50 Z" fill="#1a1a1a"/>
    <!-- Tail -->
    <path d="M15 50 L25 35 L25 50 Z" fill="#1a1a1a"/>
    <!-- Nose -->
    <ellipse cx="85" cy="50" rx="8" ry="6" fill="#1a1a1a"/>
    <!-- Engine -->
    <circle cx="55" cy="58" r="5" fill="#333"/>
  </g>
</svg>